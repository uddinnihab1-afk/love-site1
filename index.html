<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 For You</title>

<style>
body {
    margin: 0;
    font-family: 'Arial';
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* CARD */
.card {
    text-align: center;
    padding: 30px;
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
h1 {
    color: white;
    font-size: 28px;
}

p {
    color: white;
    margin-bottom: 20px;
}

/* BUTTONS */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
}

#yes {
    background: #ff4d6d;
    color: white;
    opacity: 0.4;
}

#no {
    background: #333;
    color: white;
}

/* floating hearts */
.heart {
    position: absolute;
    animation: float 4s linear forwards;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* shake effect */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% {transform: translateX(0);}
    25% {transform: translateX(-5px);}
    50% {transform: translateX(5px);}
    75% {transform: translateX(-5px);}
    100% {transform: translateX(0);}
}

</style>
</head>

<body>

<div class="card">

<h1>💍 Will You Be My Valentine?</h1>
<p id="status">Try to say NO 😏 (5 times needed)</p>

<button id="yes" disabled onclick="yesClick()">Yes 💖</button>
<button id="no" onclick="noClick()">No 😜</button>

</div>

<script>

let noClicks = 0;
let yesBtn = document.getElementById("yes");
let statusText = document.getElementById("status");
let noBtn = document.getElementById("no");

function noClick() {

    noClicks++;

    // shake effect
    noBtn.classList.add("shake");
    setTimeout(() => noBtn.classList.remove("shake"), 300);

    if (noClicks < 5) {
        statusText.innerHTML = `😏 Nope not enough... (${noClicks}/5)`;
    }

    if (noClicks >= 5) {
        statusText.innerHTML = "😳 Okay... now you can say YES";
        yesBtn.disabled = false;
        yesBtn.style.opacity = "1";

        // now NO starts escaping
        noBtn.onmouseover = moveNo;
    }
}

function moveNo() {
    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 60);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function yesClick() {
    document.body.innerHTML = "<h1 style='color:white;font-size:40px;'>💖 She Said YES 💖</h1>";
    startHearts();
}

// hearts
function createHeart() {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
}

function startHearts() {
    setInterval(createHeart, 120);
}

</script>

</body>
</html>
