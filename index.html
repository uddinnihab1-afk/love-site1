<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For You</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* CARD */
.card {
    text-align: center;
    padding: 30px;
    width: 90%;
    max-width: 420px;
    border-radius: 20px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    animation: fadeIn 1s ease;
}

/* IMAGE */
img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid white;
    margin-bottom: 10px;
}

/* TEXT */
h1 {
    color: white;
    font-size: 26px;
}

p {
    color: white;
    margin-bottom: 15px;
}

/* BUTTONS */
button {
    padding: 12px 18px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#yes {
    background: #ff4d6d;
    color: white;
    opacity: 0.5;
}

#no {
    background: #333;
    color: white;
    position: relative;
}

/* MESSAGE */
#msg {
    display: none;
    margin-top: 15px;
    font-size: 22px;
    color: white;
}

/* HEARTS */
.heart {
    position: absolute;
    animation: float 4s linear forwards;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
}

</style>
</head>

<body>

<div class="card">

<!-- 📸 SELFIE -->
<img src="selfie.jpg" alt="us">

<h1>💖 Will You Be My Valentine?</h1>
<p id="status">Say NO 5 times first 😏</p>

<button id="yes" disabled onclick="yesClick()">Yes 💖</button>
<button id="no" onclick="noClick()">No 😜</button>

<div id="msg">💖 I knew it... Love you ❤️</div>

</div>

<script>

let noClicks = 0;
let yesBtn = document.getElementById("yes");
let statusText = document.getElementById("status");
let msg = document.getElementById("msg");
let noBtn = document.getElementById("no");

function noClick() {
    noClicks++;

    statusText.innerText = `😏 Try again (${noClicks}/5)`;

    if (noClicks >= 5) {
        statusText.innerText = "😳 Okay fine... you can say YES now!";
        yesBtn.disabled = false;
        yesBtn.style.opacity = "1";

        // NO starts escaping AFTER unlock
        noBtn.onmouseover = moveNo;
    }
}

function moveNo() {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

function yesClick() {
    msg.style.display = "block";
    document.body.style.background = "linear-gradient(135deg, #ff4d6d, #ff9a9e)";
    startHearts();
}

/* hearts */
function createHeart() {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
}

function startHearts() {
    setInterval(createHeart, 120);
}

</script>

</body>
</html>
