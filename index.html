<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 For You</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* CARD */
.card {
    margin-top: 80px;
    display: inline-block;
    padding: 25px;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    color: white;
}

/* BUTTONS */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
    opacity: 0.4;
    cursor: not-allowed;
}

#no {
    background: #333;
    color: white;
    position: relative;
}

/* HEARTS */
.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div class="card">

<h2>💍 Will You Be Mine?</h2>

<h3 id="status">❌ First convince me 😏</h3>

<button id="yes" onclick="yesClick()" disabled>Yes 💖</button>
<button id="no" onclick="noClick()">No 😜</button>

</div>

<script>

let noClicks = 0;
let yesBtn = document.getElementById("yes");
let statusText = document.getElementById("status");

// NO BUTTON CLICK LOGIC
function noClick() {
    noClicks++;

    if (noClicks < 5) {
        statusText.innerHTML = "😏 Try harder... (" + noClicks + "/5)";
    }

    // after 5 clicks unlock yes + enable movement
    if (noClicks >= 5) {
        statusText.innerHTML = "😳 Okay okay... now try saying YES!";
        yesBtn.disabled = false;
        yesBtn.style.opacity = "1";
        yesBtn.style.cursor = "pointer";

        moveNoButton();
    }
}

// MOVE NO BUTTON (after unlock)
function moveNoButton() {
    let btn = document.getElementById("no");

    btn.onmouseover = function () {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 50);

        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }
}

// YES CLICK
function yesClick() {
    if (yesBtn.disabled) return;

    document.body.innerHTML = "<h1 style='color:white;margin-top:200px;'>💖 She Said YES 💖</h1>";
    startHearts();
}

// HEARTS
function createHeart() {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}

function startHearts() {
    setInterval(createHeart, 150);
}

</script>

</body>
</html>
